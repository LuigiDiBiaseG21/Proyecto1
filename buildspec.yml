version: 0.2

env:
  variables:
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
    PYTHONPATH: "."

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo Installing dependencies
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt

  pre_build:
    commands:
      - echo Pre-build phase: verifying environment
      - python --version
      - pip --version

  build:
    commands:
      - echo Running unit tests
      - python -m pytest -q

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - application.py
    - requirements.txt
    - .ebextensions/**
    - app/**
    - migrations/**
    - postman/**
    - README.md
  discard-paths: no
  base-directory: .
  exclude-paths:
    - .venv/**
    - tests/**
